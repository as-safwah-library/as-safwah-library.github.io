<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>As-Safwah Grand Portal | লাইভ</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #001a15;
            --primary-mid: #00382f;
            --accent-gold: #d4af37;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--primary-dark); color: var(--white); font-family: 'Hind Siliguri', sans-serif; line-height: 1.6; overflow-x: hidden; }

        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 26, 21, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--accent-gold);
        }
        .logo { font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 24px; font-weight: bold; }

        section { padding: 60px 8%; }
        .hero { height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1519791883288-dc8bd696e667?q=80&w=1470') center/cover fixed; margin-top: 60px; }
        
        .section-title { text-align: center; margin-bottom: 30px; font-size: 2rem; color: var(--accent-gold); position: relative; padding-bottom: 10px; }
        .section-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 2px; background: var(--accent-gold); }

        .prayer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: -60px; position: relative; z-index: 10; }
        .prayer-card { background: var(--primary-mid); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--glass); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .time { font-size: 1.1rem; font-weight: bold; display: block; color: var(--accent-gold); margin-top: 5px; }

        .admin-area { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid var(--accent-gold); margin-bottom: 40px; }
        .post-card { background: var(--primary-mid); padding: 25px; border-radius: 20px; border: 1px solid var(--glass); margin-bottom: 20px; }
        .post-title { color: var(--accent-gold); font-size: 1.4rem; margin-bottom: 10px; }
        .see-more-btn { color: var(--accent-gold); cursor: pointer; font-weight: bold; margin-top: 10px; display: inline-block; text-decoration: underline; }

        .comment-area { max-width: 800px; margin: 0 auto; background: var(--primary-mid); padding: 25px; border-radius: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--glass); background: var(--primary-dark); color: white; outline: none; font-family: inherit; }
        .master-btn { background: var(--accent-gold); color: black; padding: 12px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        
        .comment-card { background: var(--glass); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent-gold); }
        footer { text-align: center; padding: 30px; border-top: 1px solid var(--glass); font-size: 13px; color: #666; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AS-SAFWAH</div>
        <div id="today-date" style="color: var(--accent-gold);"></div>
    </nav>

    <section class="hero">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">আস-সাফওয়াহ গ্র্যান্ড পোর্টাল</h1>
        <p>জ্ঞানের সন্ধানে, এক আধুনিক উম্মাহর পথচলা</p>
    </section>

    <section style="padding-top: 0;">
        <div class="prayer-grid">
            <div class="prayer-card"><p>ফজর</p><span class="time" id="fajr">--:--</span></div>
            <div class="prayer-card"><p>যোহর</p><span class="time" id="dhuhr">--:--</span></div>
            <div class="prayer-card">
                <p>আসর</p>
                <span id="asr-shafii" style="display:block; font-size:0.85rem; color:var(--accent-gold);">শাফেয়ী: --:--</span>
                <span id="asr-hanafi" style="display:block; font-size:0.85rem; color:var(--accent-gold);">হানাফী: --:--</span>
            </div>
            <div class="prayer-card"><p>মাগরিব</p><span class="time" id="maghrib">--:--</span></div>
            <div class="prayer-card"><p>এশা</p><span class="time" id="isha">--:--</span></div>
        </div>
    </section>

    <section>
        <div class="admin-area">
            <h2 style="color: var(--accent-gold); margin-bottom: 15px; font-size: 1.2rem;"><i class="fas fa-edit"></i> অ্যাডমিন প্যানেল</h2>
            <input type="password" id="adminPass" placeholder="গোপন কোড দিন...">
            <input type="text" id="postTitle" placeholder="পোস্টের শিরোনাম...">
            <textarea id="postContent" rows="3" placeholder="বিস্তারিত লিখুন..."></textarea>
            <button class="master-btn" onclick="addPost()">পাবলিশ করুন</button>
        </div>

        <h2 class="section-title">আর্টিকেল ও সামাজিক সচেতনতা</h2>
        <div id="postsContainer"><p style="text-align:center; color:gray;">লোড হচ্ছে...</p></div>
    </section>

    <section id="community">
        <h2 class="section-title">জিজ্ঞাসা ও আলোচনা</h2>
        <div class="comment-area">
            <input type="text" id="userName" placeholder="আপনার নাম...">
            <textarea id="userText" rows="3" placeholder="আপনার মন্তব্য..."></textarea>
            <button class="master-btn" onclick="addComment()">কমেন্ট পোস্ট করুন</button>
            <div id="commentContainer" style="margin-top:20px;"></div>
        </div>
    </section>

    <footer><p>&copy; ২০২৬ আস-সাফওয়াহ গ্র্যান্ড লাইব্রেরি</p></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0RDlPnWCB8WMhLW-VTyQM6qsCECHur5E",
            authDomain: "as-safwah-portal.firebaseapp.com",
            projectId: "as-safwah-portal",
            storageBucket: "as-safwah-portal.firebasestorage.app",
            messagingSenderId: "146758609598",
            appId: "1:146758609598:web:c383d5c983bca2a6a94cef",
            databaseURL: "https://as-safwah-portal-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function format12h(timeStr) {
            if(!timeStr) return "--:--";
            let [h, m] = timeStr.split(':');
            let ampm = h >= 12 ? ' PM' : ' AM';
            h = h % 12 || 12;
            return `${h}:${m}${ampm}`;
        }

        // ১. পোস্ট পাবলিশ ফাংশন (পাসওয়ার্ড চেক)
        window.addPost = function() {
            const pass = document.getElementById('adminPass').value;
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            
            // নিচের "1234" লেখাটি মুছে আপনার আসল পাসওয়ার্ড বসান
            if(pass === "963.") { 
                if(title && content) {
                    push(ref(db, 'posts'), { title, content, timestamp: Date.now() });
                    document.getElementById('postTitle').value = '';
                    document.getElementById('postContent').value = '';
                    document.getElementById('adminPass').value = '';
                    alert("পোস্ট সফল হয়েছে!");
                } else { alert("সব তথ্য দিন।"); }
            } else { alert("ভুল পাসওয়ার্ড!"); }
        };

        // ২. রিয়েল-টাইম পোস্ট রিড
        onValue(ref(db, 'posts'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('postsContainer');
            container.innerHTML = '';
            if(!data) return;
            Object.entries(data).reverse().forEach(([id, p]) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                let isLong = p.content.length > 200;
                let text = isLong ? p.content.substring(0, 200) + "..." : p.content;
                card.innerHTML = `<h3 class="post-title">${p.title}</h3><p class="p-text">${text}</p>${isLong ? `<span class="see-more-btn" onclick="this.previousElementSibling.innerText=\`${p.content.replace(/`/g, "'")}\`; this.remove();">See More</span>` : ''}`;
                container.appendChild(card);
            });
        });

        // ৩. কমেন্ট ফাংশন
        window.addComment = function() {
            const name = document.getElementById('userName').value.trim();
            const text = document.getElementById('userText').value.trim();
            if(name && text) {
                push(ref(db, 'chats'), { name, text, timestamp: Date.now() });
                document.getElementById('userText').value = '';
            }
        };

        onValue(ref(db, 'chats'), (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('commentContainer');
            container.innerHTML = '';
            if(!data) return;
            Object.entries(data).reverse().forEach(([id, c]) => {
                const card = document.createElement('div');
                card.className = 'comment-card';
                let isLong = c.text.length > 100;
                let txt = isLong ? c.text.substring(0, 100) + "..." : c.text;
                card.innerHTML = `<strong>${c.name}</strong><p>${txt}</p>${isLong ? `<span class="see-more-btn" onclick="this.previousElementSibling.innerText=\`${c.text.replace(/`/g, "'")}\`; this.remove();">See More</span>` : ''}`;
                container.appendChild(card);
            });
        });

        // ৪. নামাজ টাইম
        async function loadPrayers() {
            try {
                const rS = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Dhaka&country=Bangladesh&method=2`);
                const dS = await rS.json();
                const rH = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Dhaka&country=Bangladesh&method=2&school=1`);
                const dH = await rH.json();
                const t = dS.data.timings;
                document.getElementById('fajr').innerText = format12h(t.Fajr);
                document.getElementById('dhuhr').innerText = format12h(t.Dhuhr);
                document.getElementById('asr-shafii').innerText = "শাফেয়ী: " + format12h(t.Asr);
                document.getElementById('asr-hanafi').innerText = "হানাফী: " + format12h(dH.data.timings.Asr);
                document.getElementById('maghrib').innerText = format12h(t.Maghrib);
                document.getElementById('isha').innerText = format12h(t.Isha);
                document.getElementById('today-date').innerText = "আজ: " + dS.data.date.readable;
            } catch (e) { }
        }
        loadPrayers();
    </script>
</body>
</html>
